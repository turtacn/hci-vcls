syntax = "proto3";

package hcivcls;

option go_package = "github.com/turtacn/hci-vcls/pkg/api/proto";

service HCIVclsService {
    rpc GetVersion(VersionRequest) returns (VersionResponse);
    rpc GetStatus(StatusRequest) returns (StatusResponse);
    rpc GetDegradation(DegradationRequest) returns (DegradationResponse);
    rpc EvaluateHA(EvaluateHARequest) returns (EvaluateHAResponse);
    rpc ListTasks(ListTasksRequest) returns (ListTasksResponse);
}

message VersionRequest {}

message VersionResponse {
    string version = 1;
    string commit = 2;
    string date = 3;
}

message StatusRequest {}

message StatusResponse {
    bool is_leader = 1;
    string leader_id = 2;
    string cluster_state = 3;
    string degradation_level = 4;
}

message DegradationRequest {}

message DegradationResponse {
    string level = 1;
}

message EvaluateHARequest {
    string cluster_id = 1;
}

message EvaluateHAResponse {
    string plan_id = 1;
}

message ListTasksRequest {
    string cluster_id = 1;
}

message ListTasksResponse {
    message TaskInfo {
        string id = 1;
        string vmid = 2;
        string status = 3;
    }
    repeated TaskInfo tasks = 1;
}

